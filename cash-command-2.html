<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cash Command 2.0</title>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --panel: #ffffff;
        --panel-soft: #f9faf7;
        --ink: #18231f;
        --muted: #66736c;
        --line: #dde4dc;
        --line-strong: #c7d2ca;
        --green: #2d6f4f;
        --green-soft: #e5f1eb;
        --blue: #235e88;
        --blue-soft: #e7f0f7;
        --amber: #a9681e;
        --amber-soft: #f8eddf;
        --red: #b23b3b;
        --red-soft: #f8e8e6;
        --text-on-dark: #ffffff;
        --shadow: 0 14px 36px rgba(24, 35, 31, 0.08);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(229, 241, 235, 0.65), rgba(246, 247, 244, 0) 320px),
          var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .app-shell {
        display: grid;
        grid-template-columns: 292px minmax(0, 1fr);
        min-height: 100vh;
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 18px;
        border-right: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(18px);
        display: flex;
        flex-direction: column;
        gap: 16px;
        overflow-y: auto;
      }

      .brand {
        display: grid;
        gap: 8px;
      }

      .brand-kicker,
      .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 0.74rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .brand-title {
        margin: 0;
        font-size: 1.55rem;
        line-height: 1.05;
        font-weight: 850;
      }

      .brand-pill {
        justify-self: start;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        color: var(--green);
        background: var(--green-soft);
        font-size: 0.82rem;
        font-weight: 800;
      }

      .context-panel,
      .topbar,
      .panel,
      .metric-tile {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .context-panel {
        padding: 12px;
        display: grid;
        gap: 10px;
        box-shadow: none;
      }

      .field {
        display: grid;
        gap: 6px;
        min-width: 0;
      }

      .field label {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line-strong);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        padding: 9px 10px;
        outline: none;
      }

      textarea {
        resize: vertical;
        min-height: 76px;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(45, 111, 79, 0.14);
      }

      .input-prefix {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        border: 1px solid var(--line-strong);
        border-radius: 7px;
        background: #fff;
        overflow: hidden;
      }

      .input-prefix span {
        padding-left: 10px;
        color: var(--muted);
        font-weight: 850;
      }

      .input-prefix input {
        border: 0;
        box-shadow: none;
      }

      .nav-list {
        display: grid;
        gap: 6px;
      }

      .nav-button {
        width: 100%;
        min-height: 42px;
        padding: 0 10px;
        border-radius: 7px;
        background: transparent;
        color: var(--muted);
        display: grid;
        grid-template-columns: 20px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        text-align: left;
        font-weight: 800;
      }

      .nav-button:hover,
      .nav-button.is-active {
        background: var(--ink);
        color: var(--text-on-dark);
      }

      .nav-button svg,
      .icon-button svg,
      .text-button svg,
      .primary-button svg {
        width: 18px;
        height: 18px;
      }

      .sidebar-metrics {
        margin-top: auto;
        display: grid;
        gap: 8px;
      }

      .sidebar-stat {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel-soft);
        font-size: 0.82rem;
      }

      .sidebar-stat span {
        color: var(--muted);
        font-weight: 750;
      }

      .sidebar-stat strong {
        font-weight: 900;
      }

      main {
        min-width: 0;
        padding: 18px;
      }

      .topbar {
        min-height: 74px;
        padding: 14px 16px;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        box-shadow: none;
      }

      .topbar h1 {
        margin: 3px 0 0;
        font-size: 1.42rem;
        line-height: 1.15;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin: 14px 0;
      }

      .metric-tile {
        min-height: 92px;
        padding: 13px;
        display: grid;
        align-content: space-between;
        gap: 8px;
        box-shadow: none;
      }

      .metric-tile span {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 850;
      }

      .metric-tile strong {
        font-size: 1.45rem;
        line-height: 1;
      }

      .metric-tile small {
        color: var(--muted);
        font-weight: 750;
      }

      .metric-tile[data-tone="good"] {
        border-color: rgba(45, 111, 79, 0.26);
        background: var(--green-soft);
      }

      .metric-tile[data-tone="warn"] {
        border-color: rgba(169, 104, 30, 0.3);
        background: var(--amber-soft);
      }

      .metric-tile[data-tone="bad"] {
        border-color: rgba(178, 59, 59, 0.3);
        background: var(--red-soft);
      }

      .tab-panel {
        display: grid;
        gap: 14px;
      }

      .panel {
        padding: 14px;
      }

      .panel-heading {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
        margin-bottom: 12px;
      }

      .panel-heading h2 {
        margin: 3px 0 0;
        font-size: 1.02rem;
        line-height: 1.2;
      }

      .panel-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .grid-two {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .grid-three {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(120px, 1fr));
        gap: 10px;
        align-items: end;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 7px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 760px;
      }

      th,
      td {
        padding: 9px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
      }

      th {
        color: var(--muted);
        background: var(--panel-soft);
        font-size: 0.78rem;
        font-weight: 900;
      }

      td {
        font-size: 0.9rem;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      td input,
      td select {
        min-height: 36px;
      }

      .number-cell {
        text-align: right;
        font-variant-numeric: tabular-nums;
        font-weight: 850;
      }

      .text-button,
      .primary-button,
      .danger-button {
        min-height: 38px;
        padding: 0 11px;
        border-radius: 7px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        font-weight: 850;
        white-space: nowrap;
      }

      .text-button {
        border: 1px solid var(--line-strong);
        background: #fff;
        color: var(--ink);
      }

      .text-button:hover {
        background: var(--panel-soft);
      }

      .primary-button {
        background: var(--green);
        color: #fff;
      }

      .danger-button {
        background: var(--red-soft);
        color: var(--red);
      }

      .icon-button {
        width: 36px;
        height: 36px;
        border-radius: 7px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line-strong);
        background: #fff;
        color: var(--muted);
      }

      .icon-button:hover {
        color: var(--red);
        border-color: rgba(178, 59, 59, 0.32);
        background: var(--red-soft);
      }

      .status-pill,
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 26px;
        padding: 0 8px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--panel-soft);
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 850;
        white-space: nowrap;
      }

      .status-pill[data-tone="good"],
      .chip[data-tone="good"] {
        border-color: rgba(45, 111, 79, 0.28);
        color: var(--green);
        background: var(--green-soft);
      }

      .status-pill[data-tone="warn"],
      .chip[data-tone="warn"] {
        border-color: rgba(169, 104, 30, 0.32);
        color: var(--amber);
        background: var(--amber-soft);
      }

      .status-pill[data-tone="bad"],
      .chip[data-tone="bad"] {
        border-color: rgba(178, 59, 59, 0.32);
        color: var(--red);
        background: var(--red-soft);
      }

      .timeline {
        display: grid;
        gap: 10px;
      }

      .timeline-track {
        position: relative;
        min-height: 124px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background:
          linear-gradient(90deg, rgba(35, 94, 136, 0.08), transparent 42%),
          #fff;
        overflow: hidden;
      }

      .timeline-day {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 1px;
        background: rgba(102, 115, 108, 0.12);
      }

      .timeline-marker {
        position: absolute;
        top: 15px;
        transform: translateX(-50%);
        width: min(168px, 26vw);
        display: grid;
        justify-items: center;
        gap: 5px;
      }

      .timeline-dot {
        width: 14px;
        height: 14px;
        border: 3px solid #fff;
        border-radius: 999px;
        background: var(--blue);
        box-shadow: 0 0 0 1px rgba(35, 94, 136, 0.36);
      }

      .timeline-label {
        width: 100%;
        padding: 7px 8px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.94);
        text-align: center;
        box-shadow: 0 8px 18px rgba(24, 35, 31, 0.07);
      }

      .timeline-label strong,
      .timeline-label span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .timeline-label span {
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 800;
      }

      .bar-list,
      .wizard-list,
      .card-list {
        display: grid;
        gap: 8px;
      }

      .bar-row {
        display: grid;
        grid-template-columns: minmax(120px, 1fr) minmax(160px, 2fr) 92px;
        align-items: center;
        gap: 10px;
      }

      .bar-row strong {
        overflow-wrap: anywhere;
      }

      .bar-track {
        height: 12px;
        border-radius: 999px;
        background: var(--line);
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        border-radius: inherit;
        background: var(--green);
        min-width: 2px;
      }

      .bar-fill[data-tone="blue"] {
        background: var(--blue);
      }

      .bar-fill[data-tone="amber"] {
        background: var(--amber);
      }

      .bar-fill[data-tone="red"] {
        background: var(--red);
      }

      .split-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .mini-stat {
        min-height: 72px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel-soft);
        display: grid;
        gap: 6px;
      }

      .mini-stat span {
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 850;
      }

      .mini-stat strong {
        font-size: 1.12rem;
        line-height: 1;
      }

      .wizard-card {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel-soft);
        padding: 11px;
        display: grid;
        grid-template-columns: 26px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
      }

      .wizard-card input[type="checkbox"] {
        width: 20px;
        min-height: 20px;
      }

      .wizard-card strong,
      .wizard-card span {
        display: block;
      }

      .wizard-card span {
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 750;
      }

      .empty-state {
        min-height: 120px;
        border: 1px dashed var(--line-strong);
        border-radius: 7px;
        display: grid;
        place-items: center;
        color: var(--muted);
        text-align: center;
        padding: 18px;
        font-weight: 800;
      }

      .checkbox-cell {
        text-align: center;
      }

      .checkbox-cell input,
      .checkbox-field input {
        width: 18px;
        min-height: 18px;
      }

      .checkbox-field {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 850;
      }

      .note {
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 750;
      }

      .mobile-cards {
        display: none;
      }

      @media (max-width: 1120px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .nav-list {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .sidebar-metrics {
          margin-top: 0;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .summary-grid,
        .grid-three {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        main,
        .sidebar {
          padding: 12px;
        }

        .topbar,
        .panel-heading {
          display: grid;
        }

        .summary-grid,
        .grid-two,
        .grid-three,
        .form-grid,
        .split-row,
        .sidebar-metrics,
        .nav-list {
          grid-template-columns: 1fr;
        }

        .metric-tile {
          min-height: 78px;
        }

        .bar-row {
          grid-template-columns: 1fr;
        }

        .panel {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <p class="brand-kicker">Household Finance</p>
          <h1 class="brand-title">Cash Command 2.0</h1>
          <span class="brand-pill">
            <i data-lucide="hard-drive" aria-hidden="true"></i>
            Local prototype
          </span>
        </div>

        <div class="context-panel">
          <div class="field">
            <label for="selectedMonth">Plan Month</label>
            <input id="selectedMonth" type="month" data-state-field="selectedMonth" />
          </div>
          <div class="field">
            <label for="anchorDate">As-Of Date</label>
            <input id="anchorDate" type="date" data-state-field="anchorDate" />
          </div>
        </div>

        <nav class="nav-list" id="tabNav" aria-label="Cash Command 2.0 sections"></nav>

        <div class="sidebar-metrics" id="sidebarMetrics"></div>
      </aside>

      <main>
        <header class="topbar">
          <div>
            <p class="eyebrow" id="activeTabKicker">Model</p>
            <h1 id="activeTabTitle">Income Timing</h1>
          </div>
          <div class="topbar-actions">
            <button class="text-button" type="button" data-action="set-today" title="Use today as the as-of date">
              <i data-lucide="calendar-check" aria-hidden="true"></i>
              Today
            </button>
            <button class="danger-button" type="button" data-action="reset-local" title="Reset Cash Command 2.0 local data">
              <i data-lucide="rotate-ccw" aria-hidden="true"></i>
              Reset Local 2.0
            </button>
          </div>
        </header>

        <section class="summary-grid" id="summaryGrid" aria-label="Monthly summary"></section>
        <section class="tab-panel" id="tabContent"></section>
      </main>
    </div>

    <script>
      const STORAGE_KEY = "cashCommand2LocalState";
      const MONEY_DIGITS = 0;

      const tabs = [
        { id: "income", label: "Income Timing", icon: "calendar-days", kicker: "Income Model" },
        { id: "plan", label: "Monthly Plan", icon: "layout-dashboard", kicker: "Forward Plan" },
        { id: "reserves", label: "Scheduled Reserves", icon: "landmark", kicker: "Timing Reserve" },
        { id: "current", label: "Current Cash", icon: "wallet-cards", kicker: "Real Snapshot" },
        { id: "weekly", label: "Weekly Budget", icon: "shopping-basket", kicker: "Household Spend" },
        { id: "map", label: "Money Map", icon: "route", kicker: "Deployable Plan" },
        { id: "deploy", label: "Deployment", icon: "list-checks", kicker: "Paycheck Wizard" },
      ];

      const defaultState = () => ({
        activeTab: "income",
        selectedMonth: toMonthKey(new Date()),
        anchorDate: toDateKey(new Date()),
        reserveFloor: 4000,
        weeklyBudgetPercent: 30,
        weekStartsOn: 1,
        partnerAName: "Husband",
        partnerBName: "Wife",
        partnerAPercent: 4,
        partnerBPercent: 4,
        activeDeploymentEventId: "",
        incomeSources: [
          {
            id: "income-primary",
            label: "Primary Paycheck",
            amount: 2574,
            cadence: "semimonthly",
            monthlyDay: 15,
            active: true,
          },
          {
            id: "income-monthly",
            label: "Monthly Income",
            amount: 0,
            cadence: "monthly",
            monthlyDay: 1,
            active: true,
          },
        ],
        expenses: [
          { id: "expense-rent", label: "Rent", amount: 2500, dueDay: 1, category: "Home", active: true, paid: false },
          { id: "expense-utilities", label: "Utilities", amount: 260, dueDay: 18, category: "Home", active: true, paid: false },
          { id: "expense-insurance", label: "Insurance", amount: 180, dueDay: 25, category: "Insurance", active: true, paid: false },
          { id: "expense-subscriptions", label: "Subscriptions", amount: 95, dueDay: 10, category: "Services", active: true, paid: false },
        ],
        bankAccounts: [
          { id: "bank-checking", label: "Checking", balance: 0 },
          { id: "bank-savings", label: "Savings", balance: 0 },
        ],
        cards: [
          { id: "card-main", label: "Primary Card", balance: 0, dueDay: 20 },
        ],
        weeklyTransactions: [],
        moneyMapChannels: [
          { id: "channel-reserve", label: "Reserve Top-Off", percent: 30, role: "Cash" },
          { id: "channel-invest", label: "Investments", percent: 40, role: "Growth" },
          { id: "channel-goals", label: "Household Goals", percent: 20, role: "Goal" },
          { id: "channel-giving", label: "Giving", percent: 10, role: "Optional" },
        ],
        deploymentLog: {},
      });

      let state = normalizeState(loadState());

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
          return saved && typeof saved === "object"
            ? mergeState(defaultState(), saved)
            : defaultState();
        } catch (error) {
          console.error("Could not load Cash Command 2.0 state", error);
          return defaultState();
        }
      }

      function mergeState(base, saved) {
        const merged = { ...base, ...saved };
        [
          "incomeSources",
          "expenses",
          "bankAccounts",
          "cards",
          "weeklyTransactions",
          "moneyMapChannels",
        ].forEach((key) => {
          if (!Array.isArray(saved[key])) merged[key] = base[key];
        });
        merged.deploymentLog =
          saved.deploymentLog && typeof saved.deploymentLog === "object"
            ? saved.deploymentLog
            : base.deploymentLog;
        return merged;
      }

      function normalizeState(nextState) {
        const normalized = { ...defaultState(), ...nextState };
        normalized.selectedMonth = normalized.selectedMonth || toMonthKey(new Date());
        normalized.anchorDate = normalized.anchorDate || toDateKey(new Date());
        normalized.reserveFloor = toNumber(normalized.reserveFloor);
        normalized.weeklyBudgetPercent = toNumber(normalized.weeklyBudgetPercent);
        normalized.partnerAPercent = toNumber(normalized.partnerAPercent);
        normalized.partnerBPercent = toNumber(normalized.partnerBPercent);
        normalized.weekStartsOn = Number.isFinite(Number(normalized.weekStartsOn))
          ? Number(normalized.weekStartsOn)
          : 1;
        normalized.incomeSources = normalized.incomeSources.map((source) => ({
          id: source.id || uid("income"),
          label: source.label || "Income",
          amount: toNumber(source.amount),
          cadence: source.cadence === "monthly" ? "monthly" : "semimonthly",
          monthlyDay: clampDay(source.monthlyDay || 1),
          active: source.active !== false,
        }));
        normalized.expenses = normalized.expenses.map((expense) => ({
          id: expense.id || uid("expense"),
          label: expense.label || "Expense",
          amount: toNumber(expense.amount),
          dueDay: clampDay(expense.dueDay || 1),
          category: expense.category || "General",
          active: expense.active !== false,
          paid: Boolean(expense.paid),
        }));
        normalized.bankAccounts = normalized.bankAccounts.map((account) => ({
          id: account.id || uid("bank"),
          label: account.label || "Account",
          balance: toNumber(account.balance),
        }));
        normalized.cards = normalized.cards.map((card) => ({
          id: card.id || uid("card"),
          label: card.label || "Card",
          balance: toNumber(card.balance),
          dueDay: clampDay(card.dueDay || 1),
        }));
        normalized.moneyMapChannels = normalized.moneyMapChannels.map((channel) => ({
          id: channel.id || uid("channel"),
          label: channel.label || "Channel",
          percent: toNumber(channel.percent),
          role: channel.role || "",
        }));
        normalized.weeklyTransactions = normalized.weeklyTransactions.map((transaction) => ({
          id: transaction.id || uid("txn"),
          date: transaction.date || normalized.anchorDate,
          amount: toNumber(transaction.amount),
          category: transaction.category || "Household",
          note: transaction.note || "",
        }));
        if (!tabs.some((tab) => tab.id === normalized.activeTab)) {
          normalized.activeTab = "income";
        }
        return normalized;
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function uid(prefix) {
        return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function $(id) {
        return document.getElementById(id);
      }

      function toNumber(value) {
        const parsed = parseFloat(String(value ?? "").replace(/,/g, ""));
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function clampDay(value) {
        const day = Math.round(toNumber(value));
        return Math.min(Math.max(day || 1, 1), 31);
      }

      function toDateKey(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function toMonthKey(date) {
        return toDateKey(date).slice(0, 7);
      }

      function parseDateKey(dateKey) {
        return new Date(`${dateKey}T12:00:00`);
      }

      function monthParts(monthKey) {
        const [year, month] = String(monthKey).split("-").map(Number);
        return { year, month: month - 1 };
      }

      function daysInMonth(monthKey) {
        const { year, month } = monthParts(monthKey);
        return new Date(year, month + 1, 0).getDate();
      }

      function dateForMonthDay(monthKey, day) {
        const { year, month } = monthParts(monthKey);
        return new Date(year, month, Math.min(clampDay(day), daysInMonth(monthKey)), 12);
      }

      function lastDayOfMonth(monthKey) {
        const { year, month } = monthParts(monthKey);
        return new Date(year, month + 1, 0, 12);
      }

      function fridayBeforeWeekend(date) {
        const adjusted = new Date(date);
        const day = adjusted.getDay();
        if (day === 6) adjusted.setDate(adjusted.getDate() - 1);
        if (day === 0) adjusted.setDate(adjusted.getDate() - 2);
        return adjusted;
      }

      function formatMoney(value, digits = MONEY_DIGITS) {
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          minimumFractionDigits: digits,
          maximumFractionDigits: digits,
        }).format(Number.isFinite(value) ? value : 0);
      }

      function formatPercent(value, digits = 1) {
        return `${(Number.isFinite(value) ? value : 0).toFixed(digits)}%`;
      }

      function formatShortDate(dateKey) {
        return parseDateKey(dateKey).toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
        });
      }

      function formatLongDate(dateKey) {
        return parseDateKey(dateKey).toLocaleDateString("en-US", {
          weekday: "short",
          month: "short",
          day: "numeric",
        });
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function sum(items, getter = (item) => item) {
        return items.reduce((total, item) => total + toNumber(getter(item)), 0);
      }

      function renderIcon(name) {
        return `<i data-lucide="${name}" aria-hidden="true"></i>`;
      }

      function getIncomeEvents(monthKey = state.selectedMonth) {
        const events = [];
        state.incomeSources
          .filter((source) => source.active)
          .forEach((source) => {
            const dates =
              source.cadence === "monthly"
                ? [dateForMonthDay(monthKey, source.monthlyDay)]
                : [dateForMonthDay(monthKey, 15), lastDayOfMonth(monthKey)];
            dates.forEach((rawDate, index) => {
              const date = fridayBeforeWeekend(rawDate);
              events.push({
                id: `${source.id}:${toDateKey(date)}:${index}`,
                sourceId: source.id,
                label:
                  source.cadence === "monthly"
                    ? source.label
                    : `${source.label} ${index + 1}`,
                sourceLabel: source.label,
                cadence: source.cadence,
                date: toDateKey(date),
                amount: toNumber(source.amount),
                sequence: index + 1,
              });
            });
          });
        return events.sort((a, b) => a.date.localeCompare(b.date));
      }

      function getWeekRange(anchorDate = state.anchorDate) {
        const date = parseDateKey(anchorDate);
        const start = new Date(date);
        const startsOn = Number(state.weekStartsOn);
        const diff = (start.getDay() - startsOn + 7) % 7;
        start.setDate(start.getDate() - diff);
        const end = new Date(start);
        end.setDate(start.getDate() + 6);
        return { start: toDateKey(start), end: toDateKey(end) };
      }

      function isWithinRange(dateKey, start, end) {
        return dateKey >= start && dateKey <= end;
      }

      function getReserveModel(events, monthKey, asOfDate) {
        const eventReserveTotals = {};
        const eventExpenseLines = {};
        let openingReserve = 0;
        const schedules = state.expenses
          .filter((expense) => expense.active)
          .map((expense) => {
            const dueDate = toDateKey(dateForMonthDay(monthKey, expense.dueDay));
            const eligibleEvents = events.filter((event) => event.date <= dueDate);
            const totalEligibleIncome = sum(eligibleEvents, (event) => event.amount);
            let allocations = [];
            let currentReserve = 0;

            if (!eligibleEvents.length || totalEligibleIncome <= 0) {
              openingReserve += expense.amount;
              currentReserve = expense.paid ? 0 : expense.amount;
              allocations = [
                {
                  id: "opening",
                  label: "Opening cash",
                  date: toDateKey(dateForMonthDay(monthKey, 1)),
                  amount: expense.amount,
                },
              ];
            } else {
              let allocated = 0;
              allocations = eligibleEvents.map((event, index) => {
                const amount =
                  index === eligibleEvents.length - 1
                    ? expense.amount - allocated
                    : expense.amount * (event.amount / totalEligibleIncome);
                allocated += amount;
                eventReserveTotals[event.id] = (eventReserveTotals[event.id] || 0) + amount;
                eventExpenseLines[event.id] = eventExpenseLines[event.id] || [];
                eventExpenseLines[event.id].push({
                  label: expense.label,
                  dueDate,
                  amount,
                });
                return {
                  id: event.id,
                  label: event.label,
                  date: event.date,
                  amount,
                };
              });

              if (expense.paid) {
                currentReserve = 0;
              } else if (dueDate <= asOfDate) {
                currentReserve = expense.amount;
              } else {
                currentReserve = sum(
                  allocations.filter((allocation) => allocation.date <= asOfDate),
                  (allocation) => allocation.amount,
                );
              }
            }

            return {
              expense,
              dueDate,
              allocations,
              currentReserve,
            };
          });

        return {
          schedules,
          eventReserveTotals,
          eventExpenseLines,
          openingReserve,
          currentReserveTotal: sum(schedules, (schedule) => schedule.currentReserve),
          monthlyExpenseTotal: sum(
            state.expenses.filter((expense) => expense.active),
            (expense) => expense.amount,
          ),
        };
      }

      function buildModel() {
        const monthKey = state.selectedMonth;
        const anchorDate = state.anchorDate;
        const events = getIncomeEvents(monthKey);
        const totalIncome = sum(events, (event) => event.amount);
        const reserveModel = getReserveModel(events, monthKey, anchorDate);
        const weeksInMonth = daysInMonth(monthKey) / 7;
        const weeklyMonthlyPool = totalIncome * (state.weeklyBudgetPercent / 100);
        const weeklyTarget = weeksInMonth > 0 ? weeklyMonthlyPool / weeksInMonth : 0;
        const totalFunPercent = state.partnerAPercent + state.partnerBPercent;
        const eventsPlan = events.map((event) => {
          const incomeShare = totalIncome > 0 ? event.amount / totalIncome : 0;
          const reserveContribution = reserveModel.eventReserveTotals[event.id] || 0;
          const weeklyShare = weeklyMonthlyPool * incomeShare;
          const partnerA = event.amount * (state.partnerAPercent / 100);
          const partnerB = event.amount * (state.partnerBPercent / 100);
          const funTotal = partnerA + partnerB;
          const deployable = event.amount - reserveContribution - weeklyShare - funTotal;
          return {
            ...event,
            incomeShare,
            reserveContribution,
            weeklyShare,
            partnerA,
            partnerB,
            funTotal,
            deployable,
          };
        });

        const monthlyFun = sum(eventsPlan, (event) => event.funTotal);
        const monthlyDeployable = sum(eventsPlan, (event) => event.deployable);
        const positiveDeployable = Math.max(monthlyDeployable, 0);
        const receivedEvents = eventsPlan.filter((event) => event.date <= anchorDate);
        const plannedFunToDate = sum(receivedEvents, (event) => event.funTotal);
        const cashTotal = sum(state.bankAccounts, (account) => account.balance);
        const cardDebt = sum(state.cards, (card) => card.balance);
        const protectedNeed = state.reserveFloor + reserveModel.currentReserveTotal;
        const cashAfterCards = cashTotal - cardDebt;
        const cashAboveProtection = cashAfterCards - protectedNeed;
        const funAvailableNow = Math.min(plannedFunToDate, Math.max(cashAboveProtection, 0));
        const funCompressed = Math.max(plannedFunToDate - funAvailableNow, 0);
        const reservePressure = Math.max(protectedNeed - cashAfterCards, 0);
        const freeCash = Math.max(cashAboveProtection - plannedFunToDate, 0);
        const weekRange = getWeekRange(anchorDate);
        const weeklyRows = state.weeklyTransactions.filter((transaction) =>
          isWithinRange(transaction.date, weekRange.start, weekRange.end),
        );
        const weeklySpent = sum(weeklyRows, (transaction) => transaction.amount);
        const channelPercentTotal = sum(state.moneyMapChannels, (channel) => channel.percent);

        return {
          monthKey,
          anchorDate,
          events,
          eventsPlan,
          totalIncome,
          reserveModel,
          weeksInMonth,
          weeklyMonthlyPool,
          weeklyTarget,
          monthlyFun,
          totalFunPercent,
          monthlyDeployable,
          positiveDeployable,
          cashTotal,
          cardDebt,
          protectedNeed,
          cashAfterCards,
          cashAboveProtection,
          plannedFunToDate,
          funAvailableNow,
          funCompressed,
          reservePressure,
          freeCash,
          weekRange,
          weeklyRows,
          weeklySpent,
          weeklyRemaining: weeklyTarget - weeklySpent,
          channelPercentTotal,
        };
      }

      function render() {
        state = normalizeState(state);
        const model = buildModel();
        renderShell(model);
        renderActiveTab(model);
        $("selectedMonth").value = state.selectedMonth;
        $("anchorDate").value = state.anchorDate;
        if (window.lucide) window.lucide.createIcons();
      }

      function renderShell(model) {
        const activeTab = tabs.find((tab) => tab.id === state.activeTab) || tabs[0];
        $("activeTabKicker").textContent = activeTab.kicker;
        $("activeTabTitle").textContent = activeTab.label;
        $("tabNav").innerHTML = tabs
          .map(
            (tab) => `
              <button
                class="nav-button ${tab.id === state.activeTab ? "is-active" : ""}"
                type="button"
                data-tab="${tab.id}"
              >
                ${renderIcon(tab.icon)}
                <span>${escapeHtml(tab.label)}</span>
              </button>
            `,
          )
          .join("");
        $("sidebarMetrics").innerHTML = `
          <div class="sidebar-stat"><span>Income</span><strong>${formatMoney(model.totalIncome)}</strong></div>
          <div class="sidebar-stat"><span>Plan Deploy</span><strong>${formatMoney(model.positiveDeployable)}</strong></div>
          <div class="sidebar-stat"><span>Reserve Now</span><strong>${formatMoney(model.reserveModel.currentReserveTotal)}</strong></div>
          <div class="sidebar-stat"><span>Free Cash</span><strong>${formatMoney(model.freeCash)}</strong></div>
        `;
        $("summaryGrid").innerHTML = `
          ${metricTile("Monthly Income", model.totalIncome, `${model.events.length} paycheck events`, "good")}
          ${metricTile("Scheduled Reserves", model.reserveModel.currentReserveTotal, "As-of target", model.reserveModel.currentReserveTotal ? "warn" : "")}
          ${metricTile("Planned Deployable", model.positiveDeployable, `${formatPercent(model.channelPercentTotal, 0)} mapped`, model.monthlyDeployable >= 0 ? "good" : "bad")}
          ${metricTile("Current Free Cash", model.freeCash, model.reservePressure ? `${formatMoney(model.reservePressure)} pressure` : "After cards, reserves, fun", model.reservePressure ? "bad" : "good")}
        `;
      }

      function metricTile(label, value, detail, tone = "") {
        return `
          <article class="metric-tile" ${tone ? `data-tone="${tone}"` : ""}>
            <span>${escapeHtml(label)}</span>
            <strong>${formatMoney(value)}</strong>

      function renderActiveTab(model) {
        const content = $("tabContent");
        if (state.activeTab === "income") content.innerHTML = renderIncomeTab(model);
        if (state.activeTab === "plan") content.innerHTML = renderPlanTab(model);
        if (state.activeTab === "reserves") content.innerHTML = renderReservesTab(model);
        if (state.activeTab === "current") content.innerHTML = renderCurrentTab(model);
        if (state.activeTab === "weekly") content.innerHTML = renderWeeklyTab(model);
        if (state.activeTab === "map") content.innerHTML = renderMoneyMapTab(model);

        }).join("");
        const markers = model.events
          .map((event) => {
            const day = parseDateKey(event.date).getDate();
            const left = ((day - 0.5) / days) * 100;
            return `
              <div class="timeline-marker" style="left: ${left}%">
                <span class="timeline-dot"></span>
                <div class="timeline-label">
                  <strong>${formatMoney(event.amount)}</strong>
                  <span>${escapeHtml(event.label)}</span>
                  <span>${formatShortDate(event.date)}</span>

      function renderExpenseRow(expense) {

      function renderDeploymentTab(model) {
        const selectedEvent =
          model.eventsPlan.find((event) => event.id === state.activeDeploymentEventId) ||
          model.eventsPlan.find((event) => event.date >= state.anchorDate) ||
          model.eventsPlan[model.eventsPlan.length - 1];
        if (selectedEvent && state.activeDeploymentEventId !== selectedEvent.id) {
          state.activeDeploymentEventId = selectedEvent.id;
          saveState();
        }
        const actions = selectedEvent ? getDeploymentActions(selectedEvent, model) : [];
        const record = selectedEvent ? getDeploymentRecord(selectedEvent.id) : { items: {}, note: "" };
        const doneCount = actions.filter((action) => record.items[action.id]).length;
        return `
          <section class="grid-two">
            <article class="panel">
              <div class="panel-heading">
                <div>
                  <p class="eyebrow">Wizard</p>
                  <h2>Selected Paycheck</h2>

                <label for="activeDeploymentEventId">Paycheck Event</label>

                    .map(
                      (event) => `

                <textarea id="deploymentNote" data-deployment-note="${selectedEvent ? selectedEvent.id : ""}">${escapeHtml(record.note || "")}</textarea>

              actions.length
                ? `<div class="wizard-list">${actions.map((action) => renderWizardAction(action, record, selectedEvent.id)).join("")}</div>`
                : `<div class="empty-state">No actions available.</div>`
            }

          <article class="panel">

      function getDeploymentRecord(eventId) {
        state.deploymentLog[eventId] = state.deploymentLog[eventId] || { items: {}, note: "" };
        return state.deploymentLog[eventId];
      }

      function getDeploymentActions(event, model) {
        const reserveLines = model.reserveModel.eventExpenseLines[event.id] || [];
        const actions = [
          {
            id: "income-landed",
            label: "Income landed",
            detail: `${event.label} received`,
            amount: event.amount,
          },
          {
            id: "current-cash-updated",
            label: "Current cash updated",
            detail: "Bank accounts and card balances",
            amount: model.cashAfterCards,
          },
        ];
        if (model.cardDebt > 0) {
          actions.push({
            id: "card-balances-covered",
            label: "Card balances covered",
            detail: "Uses fun buffer before reserve pressure",
            amount: model.cardDebt,
          });
        }
        reserveLines.forEach((line, index) => {
          actions.push({
            id: `reserve-${index}-${line.label}`,
            label: `Hold ${line.label}`,
            detail: `Due ${formatShortDate(line.dueDate)}`,
            amount: line.amount,
          });
        });
        actions.push({
          id: "weekly-budget-funded",
          label: "Household weekly budget funded",
          detail: `${formatPercent(state.weeklyBudgetPercent)} monthly income rule`,
          amount: event.weeklyShare,
        });
        actions.push({
          id: "partner-a-fun",
          label: `${state.partnerAName} fun money`,
          detail: `${formatPercent(state.partnerAPercent)} of paycheck`,
          amount: event.partnerA,
        });
        actions.push({
          id: "partner-b-fun",
          label: `${state.partnerBName} fun money`,
          detail: `${formatPercent(state.partnerBPercent)} of paycheck`,
          amount: event.partnerB,
        });
        state.moneyMapChannels.forEach((channel) => {
          const channelAmount = Math.max(event.deployable, 0) * (channel.percent / 100);
          actions.push({
            id: `channel-${channel.id}`,
            label: channel.label,
            detail: channel.role || `${formatPercent(channel.percent)} of deployable`,
            amount: channelAmount,
          });
        });
        return actions;
      }

      function renderWizardAction(action, record, eventId) {
        const checked = Boolean(record.items[action.id]);
        return `
          <label class="wizard-card">
            <input type="checkbox" ${checked ? "checked" : ""} data-deployment-event="${eventId}" data-deployment-action="${escapeHtml(action.id)}" />
            <span>
              <strong>${escapeHtml(action.label)}</strong>
              <span>${escapeHtml(action.detail)}</span>
            </span>
            <strong>${formatMoney(action.amount)}</strong>
          </label>
        `;
      }

      function updateStateField(field, value, type) {
        if (type === "number") state[field] = toNumber(value);
        else if (field === "weekStartsOn") state[field] = Number(value);
        else state[field] = value;
      }

      function updateCollection(collection, id, key, value, input) {
        const row = state[collection]?.find((item) => item.id === id);
        if (!row) return;
        if (input.type === "checkbox") row[key] = input.checked;
        else if (input.type === "number") row[key] = key.toLowerCase().includes("day") ? clampDay(value) : toNumber(value);
        else row[key] = value;
      }

      document.addEventListener("click", (event) => {
        const tabButton = event.target.closest("[data-tab]");
        if (tabButton) {
          state.activeTab = tabButton.dataset.tab;
          saveState();
          render();
          return;
        }

        const actionButton = event.target.closest("[data-action]");
        if (!actionButton) return;
        const action = actionButton.dataset.action;
        const id = actionButton.dataset.id;

        if (action === "set-today") {
          const today = new Date();
          state.anchorDate = toDateKey(today);
          state.selectedMonth = toMonthKey(today);
        }
        if (action === "reset-local" && confirm("Reset local Cash Command 2.0 data?")) {
          state = defaultState();
        }
        if (action === "add-income") {
          state.incomeSources.push({
            id: uid("income"),
            label: "New Income",
            amount: 0,
            cadence: "monthly",
            monthlyDay: 1,
            active: true,
          });
        }
        if (action === "remove-income") {
          state.incomeSources = state.incomeSources.filter((source) => source.id !== id);
        }
        if (action === "add-expense") {
          state.expenses.push({
            id: uid("expense"),
            label: "New Expense",
            amount: 0,
            dueDay: 1,
            category: "General",
            active: true,
            paid: false,
          });
        }
        if (action === "remove-expense") {
          state.expenses = state.expenses.filter((expense) => expense.id !== id);
        }
        if (action === "add-bank") {
          state.bankAccounts.push({ id: uid("bank"), label: "New Account", balance: 0 });
        }
        if (action === "remove-bank") {
          state.bankAccounts = state.bankAccounts.filter((account) => account.id !== id);
        }
        if (action === "add-card") {
          state.cards.push({ id: uid("card"), label: "New Card", balance: 0, dueDay: 20 });
        }
        if (action === "remove-card") {
          state.cards = state.cards.filter((card) => card.id !== id);
        }
        if (action === "add-channel") {
          state.moneyMapChannels.push({ id: uid("channel"), label: "New Channel", percent: 0, role: "" });
        }
        if (action === "remove-channel") {
          state.moneyMapChannels = state.moneyMapChannels.filter((channel) => channel.id !== id);
        }
        if (action === "remove-weekly-row") {
          state.weeklyTransactions = state.weeklyTransactions.filter((row) => row.id !== id);
        }
        if (action === "sync-weekly-400") {
          const model = buildModel();
          const monthlyTarget = 400 * model.weeksInMonth;
          state.weeklyBudgetPercent = model.totalIncome > 0 ? (monthlyTarget / model.totalIncome) * 100 : state.weeklyBudgetPercent;
        }
        if (action === "mark-all-deployment") {
          const model = buildModel();
          const eventId = state.activeDeploymentEventId;
          const selectedEvent = model.eventsPlan.find((item) => item.id === eventId);
          if (selectedEvent) {
            const record = getDeploymentRecord(eventId);
            getDeploymentActions(selectedEvent, model).forEach((item) => {
              record.items[item.id] = true;
            });
          }
        }

        saveState();
        render();
      });

      document.addEventListener("change", (event) => {
        const input = event.target;
        if (!(input instanceof HTMLInputElement || input instanceof HTMLSelectElement || input instanceof HTMLTextAreaElement)) return;

        if (input.dataset.stateField) {
          updateStateField(input.dataset.stateField, input.value, input.type);
        }
        if (input.dataset.collection) {
          updateCollection(input.dataset.collection, input.dataset.id, input.dataset.key, input.value, input);
        }
        if (input.dataset.deploymentEvent && input.dataset.deploymentAction) {
          const record = getDeploymentRecord(input.dataset.deploymentEvent);
          record.items[input.dataset.deploymentAction] = input.checked;
        }
        if (input.dataset.deploymentNote) {
          const record = getDeploymentRecord(input.dataset.deploymentNote);
          record.note = input.value;
        }

        saveState();
        render();
      });

      document.addEventListener("submit", (event) => {
        const form = event.target;
        if (!(form instanceof HTMLFormElement)) return;
        if (form.dataset.form === "weekly-transaction") {
          event.preventDefault();
          const formData = new FormData(form);
          state.weeklyTransactions.push({
            id: uid("txn"),
            date: formData.get("date") || state.anchorDate,
            amount: toNumber(formData.get("amount")),
            category: formData.get("category") || "Household",
            note: "",
          });
          saveState();
          render();
        }
      });

      render();
    </script>
  </body>
</html>
